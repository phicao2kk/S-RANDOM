<!DOCTYPE html>
<html lang="vi">
<head>
    <!-- Kết nối Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Đăng ký Service Worker -->
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('S-RANDOM PWA Ready!', reg))
            .catch(err => console.log('PWA Error', err));
        });
    }
    </script>
    <!-- 1. Icon cho iPhone/iPad (iOS) -->
    <link rel="apple-touch-icon" href="https://i.ibb.co/CpjJQtd8/S-RANDOM.png">

    <!-- 2. Icon cho Android/Chrome -->
    <link rel="icon" type="image/png" href="https://i.ibb.co/CpjJQtd8/S-RANDOM.png">

    <!-- 3. Tên hiển thị dưới Icon trên màn hình chính -->
    <meta name="apple-mobile-web-app-title" content="S-RANDOM">

    <!-- 4. Chế độ chạy như App (Ẩn thanh địa chỉ trình duyệt) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- 5. Màu sắc thanh trạng thái trên Mobile -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S-RANDOM Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #6366f1; --bg: #030712; }
        #name-input {
            min-height: 250px;
        }

        .lang-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }
        .lang-item {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
        }
        .lang-item:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.4);
        }
        .lang-item.active {
            background: rgba(99, 102, 241, 0.2);
            border-color: #6366f1;
            color: #818cf8;
            font-weight: 700;
        }

        /* Thanh tìm kiếm trong Modal */
        .search-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            width: 100%;
            color: white;
            outline: none;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .search-box:focus {
            border-color: #6366f1;
            background: rgba(255, 255, 255, 0.08);
        }
        .lang-list-container {
            max-height: 400px; /* Giới hạn chiều cao để cuộn */
            overflow-y: auto;
        }


        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: #f8fafc; 
            min-height: 100dvh; 
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto; /* Cho phép cuộn để xem danh sách ở dưới */
        }

        #modal-overlay, #winner-overlay, #lang-overlay {
            position: fixed; 
            inset: 0;
            z-index: 9999;
            display: none; /* Thêm lại dòng này để mặc định ẩn */
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
        }

        /* Quan trọng: Để class flex của Tailwind có tác dụng trên ID */
        #modal-overlay.flex, #winner-overlay.flex, #lang-overlay.flex {
            display: flex !important;
        }

        @media (min-width: 1024px) {
            body { overflow: hidden; height: 100vh; }
        }
        
        .mesh-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(34, 211, 238, 0.1) 0px, transparent 50%); background-color: #020617; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); }
        
        #wheel-container { 
            position: relative; 
            width: 90vw; 
            height: 90vw; 
            max-width: 500px; 
            max-height: 500px;
            margin: 0 auto;
            cursor: pointer; 
        }

        @media (min-width: 1024px) {
            #wheel-container { 
                width: 82vh; 
                height: 82vh; 
                max-width: 620px; 
                max-height: 620px;
            }
        }

        canvas { width: 100% !important; height: 100% !important; filter: drop-shadow(0 0 60px rgba(0,0,0,0.6)); }

        /* Mũi tên cầu vồng 7 sắc cầu vồng */
        .pointer-wrapper { 
            position: absolute; 
            right: -20px; 
            top: 50%; 
            transform: translateY(-50%); /* Cố định vị trí căn giữa ở đây */
            z-index: 100; 
            pointer-events: none; 
        }
        .pointer-arrow {
            width: 70px; 
            height: 50px; 
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            background-size: 400% 400%;
            animation: rainbow-move 3s linear infinite;
            clip-path: polygon(0 50%, 100% 0, 80% 50%, 100% 100%);
            filter: drop-shadow(-5px 0 15px rgba(255, 255, 255, 0.3));
            
            /* GỐC XOAY: Khóa chặt ở mép phải (đuôi) */
            transform-origin: 100% 50% !important; 
            
            /* Mặc định là không xoay */
            transform: rotate(0deg);
            
            /* Tốc độ nảy cực nhanh để tạo cảm giác đanh */
            transition: transform 0.05s cubic-bezier(0.1, 0.9, 0.2, 1);
            will-change: transform;
        }
        @keyframes rainbow-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .pointer-tick {
            transform: rotate(-20deg) !important; /* Mũi nhọn bên trái sẽ hất lên trên */
        }

        .guide-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 20; pointer-events: none; }
        .guide-text span {
            font-weight: 900; color: white; text-transform: uppercase; letter-spacing: 2px;
            font-size: clamp(24px, 5vw, 45px); text-shadow: 0 0 30px rgba(0,0,0,0.9);
            animation: breathe 2s infinite;
        }
        @keyframes breathe { 0%, 100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

        .tab-btn { padding: 14px 24px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #64748b; border-bottom: 3px solid transparent; transition: all 0.3s; }
        .tab-btn.active { color: #818cf8; border-bottom-color: #6366f1; background: linear-gradient(to top, rgba(99, 102, 241, 0.1), transparent); }

        textarea { 
            background: #0f172a; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: #ffffff; 
            border-radius: 24px; 
            padding: 20px 24px !important; 
            box-sizing: border-box !important;
            font-size: 17px; 
            font-weight: 600;
            width: 100%; 
            height: 100%; 
            outline: none; 
            resize: none; 
            line-height: 1.6;
            letter-spacing: 1px;
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.4);
            min-height: 200px;
            height: 100%;
        }
        textarea:focus { border-color: #6366f1; background: #111a2e; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.4); border-radius: 10px; }
        /* Hiệu ứng rung nhẹ vòng quay khi nhập liệu */
        @keyframes wheel-glow {
            0% { filter: drop-shadow(0 0 60px rgba(99, 102, 241, 0.4)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 80px rgba(99, 102, 241, 0.6)); transform: scale(1.01); }
            100% { filter: drop-shadow(0 0 60px rgba(99, 102, 241, 0.4)); transform: scale(1); }
        }
        .wheel-syncing { animation: wheel-glow 0.3s ease-in-out; }

        /* Container chứa các thông báo */
        #toast-container {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            width: 90%;
            max-width: 400px;
            pointer-events: none;
        }

        /* Thẻ thông báo hiện đại */
        .elite-toast {
            pointer-events: auto;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid #6366f1; /* Màu chủ đạo */
            border-radius: 16px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: white;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            animation: toast-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes toast-in {
            from { transform: translateY(50px) scale(0.9); opacity: 0; filter: blur(10px); }
            to { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
        }

        .toast-exit {
            animation: toast-out 0.5s ease forwards;
        }

        @keyframes toast-out {
            to { transform: scale(0.9); opacity: 0; filter: blur(10px); }
        }

        /* Thanh tiến trình (Progress Bar) */
        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #6366f1, #22d3ee);
            width: 100%;
            transform-origin: left;
            animation: progress-load 3s linear forwards;
        }

        @keyframes progress-load {
            from { transform: scaleX(1); }
            to { transform: scaleX(0); }
        }

        .toast-icon {
            font-size: 1.25rem;
            background: rgba(99, 102, 241, 0.1);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            color: #818cf8;
        }
    </style>
</head>
<body>
<div class="mesh-bg"></div>

<!-- WINNER MODAL -->

<div class="h-full flex flex-col">
<!-- NAVBAR -->

<script>

let lastTickAngle = 0; // Theo dõi góc để bắt nhịp tick

function checkTick(items) {
    const arc = (Math.PI * 2) / items.length;
    
    // Offset 0.05 giúp mũi tên nảy ngay khi mép chấm bạc vừa chạm vào
    const offset = 0.05; 
    const currentTickIndex = Math.floor((currentAngle + offset) / arc);

    if (currentTickIndex !== window.lastTickIndex) {
        const pointer = document.getElementById("pointer");
        
        // Loại bỏ class cũ để reset hiệu ứng
        pointer.classList.remove('pointer-tick');
        
        // Thủ thuật ép trình duyệt render lại (Reflow) để nảy liên tục không bị mất nhịp
        void pointer.offsetWidth; 
        
        pointer.classList.add('pointer-tick');
        
        // Gỡ class nhanh (sau 50ms) để mũi tên đập xuống ngay lập tức
        setTimeout(() => {
            pointer.classList.remove('pointer-tick');
        }, 50);
        
        window.lastTickIndex = currentTickIndex;
    }
}

function updateAmbientRotation() {
    if (!isSpinning) {
        currentAngle += 0.003; // Tốc độ trôi chậm
        
        const wheel = wheels.find(w => w.id === activeId);
        const items = wheel.items.length > 0 ? wheel.items : ["TRỐNG"];
        
        checkTick(items); // Gọi hàm kiểm tra tick
        draw();
    }
    requestAnimationFrame(updateAmbientRotation);
}

    be: "Беларуская", bg: "български", kk: "Қαзақ тілі", uk: "Українська", ka: "ქართული", 
    hy: "Հայერენ", he: "עברית", ur: "اردو", ar: "العربية", sd: "سنڌي", fa: "فارسی", 
    am: "አማርኛ", hi: "हिंदी", bn: "বাংলা", pa: "ਪੰਜਾਬੀ", gu: "ગુજરાતી", ta: "தமிழ்", 
    kn: "ಕನ್ನಡ", ml: "മലയാളം", th: "ไทย", lo: "ພາສາລາວ", my: "မြန်မာစာ", ko: "한국어", 
    ja: "日本語", zh: "简体中文", zht: "繁體中文"
};

// 2. Bộ từ điển (Hiện tại hỗ trợ VI, EN, FR. Các ngôn ngữ khác sẽ tự dùng EN)
const i18n = {
    vi: {

// Gán mặc định các ngôn ngữ khác theo English
Object.keys(langNames).forEach(code => { if(!i18n[code]) i18n[code] = i18n.en; });

// Hàm tự động phát hiện ngôn ngữ - ĐÃ CẬP NHẬT ƯU TIÊN LỰA CHỌN THỦ CÔNG
function detectUserLanguage() {
    // 1. ƯU TIÊN 1: Kiểm tra xem người dùng đã từng chọn thủ công chưa (đã lưu trong localStorage)
    const savedLang = localStorage.getItem('s-random-pro-lang');
    if (savedLang && langNames[savedLang]) {
        return savedLang;
    }

    // 2. ƯU TIÊN 2: Nếu chưa chọn thủ công, lấy ngôn ngữ của trình duyệt (ví dụ: 'vi', 'en', 'ja'...)
    const browserLang = navigator.language.split('-')[0];
    if (langNames[browserLang]) {
        return browserLang;
    }

    // 3. CUỐI CÙNG: Mặc định là 'en' nếu không khớp trường hợp nào
    return 'en';
}

// Gán ngôn ngữ ban đầu
let currentLang = detectUserLanguage();

function setLanguage(lang, isAuto = false) {
    const oldLang = currentLang;
    currentLang = lang;

    // 1. Cập nhật tên ngôn ngữ hiển thị trên Navbar
    // Chúng ta lấy tên từ danh sách langNames (ví dụ: "Tiếng Việt")
    document.getElementById('current-lang-text').innerText = langNames[lang];

    // Dịch các nhãn giao diện (giữ nguyên code cũ của bạn)
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18n[lang][key]) el.innerText = i18n[lang][key];
    });

    // 2. LOGIC QUAN TRỌNG: Dịch nội dung bánh xe nếu là mặc định
    wheels.forEach(wheel => {
        // Nếu tên bánh xe trùng với tên mặc định của ngôn ngữ cũ -> Đổi sang tên mặc định mới
        if (wheel.name === i18n[oldLang].default_wheel_name) {
            wheel.name = i18n[lang].default_wheel_name;
        }

        // So sánh danh sách items hiện tại với danh sách mặc định cũ
        const isDefaultItems = JSON.stringify(wheel.items) === JSON.stringify(i18n[oldLang].default_items);
        if (isDefaultItems) {
            wheel.items = [...i18n[lang].default_items];
        }
    });

    // 3. Cập nhật giao diện (giữ nguyên code cũ của bạn)
    document.getElementById('name-input').placeholder = i18n[lang].placeholder;
    document.querySelector('#guide-overlay span').innerText = i18n[lang].spin;
    
    loadActive(); // Tải lại dữ liệu lên Textarea
    renderTabs(); // Vẽ lại các Tab tên bánh xe
    draw();       // Vẽ lại vòng quay
    closeLangModal();
    if (!isAuto) {
            showToast(langNames[lang].toUpperCase(), 'success');
            localStorage.setItem('s-random-pro-lang', lang);
        }
}

function renderLangList(filter = "") {
    const recCodes = ['vi', 'en', 'ja', 'ko', 'zh'];
    const searchLower = filter.toLowerCase();
    const renderItem = (code) => `
        <div class="lang-item ${currentLang === code ? 'active' : ''}" onclick="setLanguage('${code}')">
            ${langNames[code]}
        </div>
    `;
    const allFiltered = Object.keys(langNames).filter(code => langNames[code].toLowerCase().includes(searchLower));
    document.getElementById('lang-all').innerHTML = allFiltered.map(renderItem).join('');
    const recSection = document.getElementById('recommended-section');
    if (filter === "") {
        recSection.classList.remove('hidden');
        document.getElementById('lang-recommended').innerHTML = recCodes.map(renderItem).join('');
    } else {
        recSection.classList.add('hidden');
    }
}

function openLangModal() {
    document.getElementById('lang-overlay').classList.replace('hidden', 'flex');
    document.getElementById('lang-search').value = "";
    renderLangList();
}

function filterLanguages() {
    renderLangList(document.getElementById('lang-search').value);
}

function closeLangModal() {
    document.getElementById('lang-overlay').classList.replace('flex', 'hidden');
}

    let wheels = [
        { 
            id: 1, 
            name: i18n[currentLang].default_wheel_name + " 1", 
            items: [...i18n[currentLang].default_items] 
        }
    ];
    let activeId = 1;
    let isSpinning = false;
    let currentAngle = 0;
    
    const canvas = document.getElementById("wheel-canvas");
    const ctx = canvas.getContext("2d");
    const pointer = document.getElementById("pointer");
    const inputArea = document.getElementById('name-input');

    document.addEventListener("DOMContentLoaded", () => {
        setLanguage(currentLang, true); 
        renderTabs(); 
        loadActive(); 
        draw(); 
        
        // Kích hoạt xoay chậm ngay lập tức
        updateAmbientRotation(); 
    });

    function renderTabs() {
        const list = document.getElementById('tabs-list');
        list.innerHTML = wheels.map(w => `
            <button onclick="switchWheel(${w.id})" class="tab-btn ${w.id === activeId ? 'active' : ''}">${w.name}</button>
        `).join('');
    }

    function switchWheel(id) { if(!isSpinning) { activeId = id; renderTabs(); loadActive(); } }

    function loadActive() {
        const w = wheels.find(x => x.id === activeId);
        inputArea.value = w.items.join('\n');
        draw();
    }

    function handleInput() {
        const w = wheels.find(x => x.id === activeId);
        w.items = inputArea.value.split('\n').map(s => s.trim()).filter(s => s);
        
        // Thêm hiệu ứng rung/sáng cho vòng quay khi đang nhập
        const container = document.getElementById('wheel-container');
        container.classList.remove('wheel-syncing');
        void container.offsetWidth; // Force reflow
        container.classList.add('wheel-syncing');
        
        draw();
    }

    function showToast(message, type = 'success') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'elite-toast';
    
    let icon = 'fa-check-circle';
    if(type === 'shuffle') icon = 'fa-shuffle';
    if(type === 'sort') icon = 'fa-sort-alpha-down';
    if(type === 'undo') icon = 'fa-trash-can'; // Icon cho thông báo xóa
    if(type === 'error') { icon = 'fa-triangle-exclamation'; toast.style.borderLeftColor = '#fb7185'; }

    // Phần nội dung thông báo
    let actionBtnHtml = '';
    if(type === 'undo') {
        // Tạo nút Khôi phục nếu loại thông báo là 'undo'
        actionBtnHtml = `
            <button onclick="undoDelete(this)" class="ml-auto bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider transition-all border border-white/10">
                ${i18n[currentLang].undo}
            </button>
        `;
    }

    toast.innerHTML = `
        <div class="toast-icon"><i class="fa-solid ${icon}"></i></div>
        <div class="flex-1">
            <div class="text-[10px] font-black uppercase tracking-[2px] opacity-50 mb-0.5">S-System</div>
            <div class="text-sm font-bold tracking-wide">${message}</div>
        </div>
        ${actionBtnHtml}
        <div class="toast-progress"></div>
    `;

    container.appendChild(toast);

    setTimeout(() => {
        if(toast) {
            toast.classList.add('toast-exit');
            setTimeout(() => toast.remove(), 500);
        }
    }, 4000); // Tăng thời gian lên 4 giây để người dùng kịp bấm
}

// HÀM XỬ LÝ KHÔI PHỤC
function undoDelete(btnElement) {
    if (lastDeletedWheel) {
        wheels.push(lastDeletedWheel);
        activeId = lastDeletedWheel.id;
        lastDeletedWheel = null; // Xóa bộ nhớ đệm
        
        renderTabs();
        loadActive();
        
        // Đóng thông báo ngay lập tức
        const toast = btnElement.closest('.elite-toast');
        toast.remove();
        
        showToast("ĐÃ KHÔI PHỤC THÀNH CÔNG", "success");
    }
}

    function draw() {
    const wheel = wheels.find(x => x.id === activeId);
    const list = wheel.items.length > 0 ? wheel.items : ["TRỐNG"];
    const arc = (Math.PI * 2) / list.length;
    
    canvas.width = 1200; canvas.height = 1200;
    ctx.clearRect(0, 0, 1200, 1200);

    // BƯỚC 1: Vẽ các mảnh màu và chữ
    list.forEach((text, i) => {
        const angle = currentAngle + i * arc;
        const hue = (i * (360 / list.length)) % 360;
        ctx.fillStyle = `hsl(${hue}, 70%, 55%)`;
        
        // Vẽ mảnh màu
        ctx.beginPath();
        ctx.moveTo(600, 600);
        ctx.arc(600, 600, 580, angle, angle + arc);
        ctx.fill();

        // Vẽ chữ
        ctx.save();
        ctx.translate(600, 600);
        ctx.rotate(angle + arc / 2);
        ctx.textAlign = "right";
        ctx.fillStyle = "white";
        ctx.font = "800 42px 'Plus Jakarta Sans'";
        ctx.fillText(text.toUpperCase().substring(0, 15), 500, 15);
        ctx.restore();
    });

    // BƯỚC 2: Vẽ các CHẤM (PINS) - Vẽ sau cùng để luôn ở trên
    list.forEach((text, i) => {
        const angle = currentAngle + i * arc; // Đây là vị trí CHÍNH XÁC của cái chấm
        ctx.save();
        ctx.translate(600, 600);
        ctx.rotate(angle); 

        const pinX = 580; 
        // Tạo hiệu ứng khối cho chấm bạc
        const grad = ctx.createRadialGradient(pinX-5, -5, 2, pinX, 0, 12);
        grad.addColorStop(0, "#ffffff");
        grad.addColorStop(1, "#94a3b8");
        
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(pinX, 0, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    });
}

    function spinWheel() {
    const items = wheels.find(x => x.id === activeId).items;
    if (isSpinning || items.length < 2) return;
    isSpinning = true;
    document.getElementById('guide-overlay').style.opacity = 0;
    
    let startTime = null;
    const duration = 7000 + Math.random() * 2000;
    const totalRotation = (30 + Math.random() * 20) * Math.PI * 2;
    const startRotation = currentAngle;

    function animate(time) { // Sử dụng "time" đúng như code của bạn
        if (!startTime) startTime = time;
        const progress = Math.min((time - startTime) / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 5); 
        currentAngle = startRotation + totalRotation * ease;
        
        const arc = (Math.PI * 2) / items.length;
        
        // --- LOGIC TICK CHUẨN XÁC THEO CÁI CHẤM ---
        // Thay vì tính currentIdx, ta tính số lượng "vạch" đã đi qua
        const currentTickIdx = Math.floor(currentAngle / arc);
        if (window.lastTickIdx !== currentTickIdx) {
            const pointer = document.getElementById("pointer");
            pointer.classList.add('pointer-tick');
            setTimeout(() => pointer.classList.remove('pointer-tick'), 50);
            window.lastTickIdx = currentTickIdx;
        }
        // ------------------------------------------

        draw();
        if (progress < 1) requestAnimationFrame(animate);
        else finishSpin();
    }
    requestAnimationFrame(animate);
}

    function finishSpin() {
        isSpinning = false;
        document.getElementById('guide-overlay').style.opacity = 1;
        const items = wheels.find(x => x.id === activeId).items;
        const arc = (Math.PI * 2) / items.length;
        const winningAngle = (Math.PI * 2 - (currentAngle % (Math.PI * 2))) % (Math.PI * 2);
        const index = Math.floor(winningAngle / arc) % items.length;
        document.getElementById('winner-name').innerText = items[index];
        document.getElementById('winner-overlay').classList.replace('hidden', 'flex');
        setTimeout(() => document.getElementById('winner-card').style.transform = 'scale(1)', 50);
        confetti({ 
            particleCount: 250, 
            spread: 100, 
            origin: { y: 0.6 },
            zIndex: 10000 // Thêm dòng này để pháo hoa bay đè lên trên Modal
        });
    }

    function closeWinner() {
        document.getElementById('winner-card').style.transform = 'scale(0)';
        setTimeout(() => document.getElementById('winner-overlay').classList.replace('flex', 'hidden'), 400);
    }

function addNewWheel() {
    const id = Date.now();
    
    // Lấy tên mặc định từ từ điển (ví dụ: BÁNH XE hoặc WHEEL)
    const baseName = i18n[currentLang].default_wheel_name;
    
    // Tự động cộng thêm số thứ tự (ví dụ: BÁNH XE 2)
    const newName = `${baseName} ${wheels.length + 1}`;
    
    // Lấy danh sách tên mặc định (ví dụ: Tên A, Tên B... hoặc Name A, Name B...)
    const newItems = [...i18n[currentLang].default_items];

    // Đẩy vào danh sách wheels
    wheels.push({ 
        id: id, 
        name: newName, 
        items: newItems 
    });

    // Chuyển sang vòng quay mới tạo
    activeId = id; 
    
    renderTabs(); 
    loadActive();
    
    // Thông báo cho người dùng
    showToast(i18n[currentLang].add_wheel, 'success');
}
function deleteActiveWheel() {
    if (wheels.length <= 1) {
        showToast(i18n[currentLang].error_min_wheel, "error");
        return;
    }

    openModal({
        title: i18n[currentLang].delete.toUpperCase(),
        desc: i18n[currentLang].confirm_del,
        showInput: false,
        callback: () => {
            const index = wheels.findIndex(w => w.id === activeId);
            
            // LƯU LẠI VÒNG QUAY VỪA XÓA ĐỂ KHÔI PHỤC
            lastDeletedWheel = { ...wheels[index] }; 
            
            wheels.splice(index, 1);
            activeId = wheels[0].id;
            
            renderTabs();
            loadActive();
            
            // HIỆN THÔNG BÁO CÓ NÚT KHÔI PHỤC
            showToast(i18n[currentLang].toast_undo_success, "success");
        }
    });
}

// --- LOGIC MODAL TÙY CHỈNH ---
let modalCallback = null;

function openModal({ title, desc, showInput, defaultValue, callback }) {
    const overlay = document.getElementById('modal-overlay');
    const card = document.getElementById('modal-card');
    const inputWrapper = document.getElementById('modal-input-wrapper');
    const input = document.getElementById('modal-input');
    
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-desc').innerText = desc || "";
    modalCallback = callback;

    // HIỆN hoặc ẨN ô nhập liệu tùy vào mục đích (Đổi tên thì hiện, Xóa thì ẩn)
    if (showInput) {
        inputWrapper.classList.remove('hidden');
        input.value = defaultValue || "";
        setTimeout(() => input.focus(), 100);
    } else {
        inputWrapper.classList.add('hidden');
    }

    overlay.classList.replace('hidden', 'flex');
    setTimeout(() => {
        card.classList.remove('scale-90', 'opacity-0');
        card.classList.add('scale-100', 'opacity-100');
    }, 10);
}

document.getElementById('modal-confirm-btn').onclick = () => {
    const inputValue = document.getElementById('modal-input').value;
    if (modalCallback) modalCallback(inputValue); 
    closeModal();
};

// Thêm tính năng nhấn Enter để xác nhận
document.getElementById('modal-input').onkeyup = (e) => {
    if (e.key === 'Enter') document.getElementById('modal-confirm-btn').click();
};

function closeModal() {
    const overlay = document.getElementById('modal-overlay');
    const card = document.getElementById('modal-card');
    card.classList.replace('scale-100', 'opacity-100', 'scale-90');
    card.classList.add('opacity-0');
    setTimeout(() => overlay.classList.replace('flex', 'hidden'), 300);
}

// --- CẬP NHẬT CÁC HÀM CHỨC NĂNG ---

function renameActiveWheel() {
    const wheel = wheels.find(x => x.id === activeId);
    openModal({
        // Sử dụng từ điển thay vì viết chữ "ĐỔI TÊN"
        title: i18n[currentLang].rename.toUpperCase(),
        desc: i18n[currentLang].placeholder,
        showInput: true,
        defaultValue: wheel.name,
        callback: (newName) => {
            if (newName && newName.trim() !== "") {
                wheel.name = newName.trim().toUpperCase();
                renderTabs();
                // Hiển thị thông báo theo ngôn ngữ hiện tại
                showToast(`${i18n[currentLang].toast_rename} ${wheel.name}`);
                confetti({ particleCount: 40, spread: 50, origin: { y: 0.9 } });
            }
        }
    });
}

function shuffleList() {
    const w = wheels.find(x => x.id === activeId);
    w.items.sort(() => Math.random() - 0.5);
    loadActive();
    // Gọi Toast hiện đại với icon shuffle
    showToast(i18n[currentLang].toast_shuffle, 'shuffle');
}

function sortList() {
    const w = wheels.find(x => x.id === activeId);
    w.items.sort();
    loadActive();
    // Gọi Toast hiện đại với icon sort
    showToast(i18n[currentLang].toast_sort, 'sort');
}
